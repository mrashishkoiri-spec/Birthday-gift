<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    overflow:hidden;
    text-align:center;
}

.container{
    padding:20px;
    max-width:500px;
    width:90%;
    z-index:10;
}

.card{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px 20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

h1{
    font-size:clamp(2rem,6vw,3.5rem);
    color:#fff;
    margin-bottom:15px;
    animation:bounce 2s infinite;
}

.message{
    color:#fff;
    font-size:1.1rem;
    line-height:1.6;
    margin-bottom:20px;
}

button{
    background:#ff4081;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:50px;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

#surprise{
    margin-top:20px;
    color:white;
    font-size:1.2rem;
    font-weight:bold;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
    <div class="card">
        <h1>🎂 Happy Birthday 🎉</h1>

        <p class="message">
            Wishing you a day filled with happiness, laughter,
            and unforgettable memories. May all your dreams
            come true and your year ahead be amazing!
        </p>

        <button onclick="showWish()">Open Surprise 🎁</button>

        <div id="surprise" class="hidden">
            🌟 Have a fantastic birthday and a wonderful year ahead! 🌟
        </div>
    </div>
</div>

<script>
function showWish(){
    document.getElementById("surprise").classList.remove("hidden");
}

/* Confetti Animation */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const pieces = [];

for(let i=0;i<180;i++){
    pieces.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height-canvas.height,
        size: Math.random()*8+4,
        speed: Math.random()*3+2,
        color: `hsl(${Math.random()*360},100%,50%)`,
        rotation: Math.random()*360
    });
}

function drawConfetti(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rotation*Math.PI/180);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
        ctx.restore();

        p.y += p.speed;
        p.rotation += 2;

        if(p.y > canvas.height){
            p.y = -20;
            p.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(drawConfetti);
}

drawConfetti();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
